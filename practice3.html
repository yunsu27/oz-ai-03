<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="box">마우스를 올려보세요.</p>

    <script>
        // mouseover -> 글씨를 orange 색으로 변경
        // mouseout -> 글씨를 black 색으로 변경

        const box = document.querySelector("#box");

        function changeColor(color) {
            box.style.color = color;
            console.log("색상이 변경되었습니다.")
        };

        // 이벤트 리스너를 등록할 때, 함수 정의를 동시에 할 수 있다
        box.addEventListener("mouseover", () => changeColor("orange"));
        box.addEventListener("mouseout", () => changeColor("black"));

        // '() => {}' 형태를 보면 함수라고 해석한다.
        // addEventListener(이벤트, 함수)
    </script>
</body>
</html>
