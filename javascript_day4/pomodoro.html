<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <!-- Pomodoro -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body text-center">
                        <h4 class="mb-3">Pomodoro Timer</h4>

                        <div class="input-group mb-3">
                            <input autocomplete="off" id="time-input" type="number" class="form-control"
                                placeholder="분 단위 입력" />
                            <button id="start-timer" class="btn btn-success">시작</button>
                            <button id="stop-timer" class="btn btn-secondary">중지</button>
                        </div>

                        <div id="timer-display" class="fs-3 text-muted">시간을 설정하세요.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="pomodoro.js"></script>
</body>
</html>
